<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ICC Clinic</title>
    <style>
        :root {
            --primary-blue: #0A3D6B;
            --secondary-blue: #1C65A6;
            --accent-gold: #D4AF37;
            --bg-light: #F4F6F8;
            --text-dark: #333333;
            --text-light: #FFFFFF;
            --border-color: #DDDDDD;
            --sidebar-width: 60px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .fade-view {
            opacity: 1;
            transition: opacity 0.4s ease, transform 0.4s ease;
            transform: translateY(0);
        }

        .fade-hidden {
            opacity: 0;
            pointer-events: none;
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            transform: translateY(10px);
        }

        .btn {
            background-color: var(--primary-blue);
            color: var(--text-light);
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s, transform 0.1s;
        }
        
        .btn:hover { background-color: var(--secondary-blue); }
        .btn:active { transform: scale(0.98); }
        
        .btn-outline {
            background-color: transparent;
            color: var(--primary-blue);
            border: 1px solid var(--primary-blue);
        }
        
        .btn-outline:hover {
            background-color: var(--primary-blue);
            color: var(--text-light);
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            border-color: var(--secondary-blue);
            box-shadow: 0 0 5px rgba(28, 101, 166, 0.3);
        }

        #app-view {
            display: flex;
            height: 100vh;
            width: 100%;
            background: var(--bg-light);
        }
        
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--primary-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            z-index: 10;
        }
        
        .sidebar-icon {
            color: var(--accent-gold);
            font-size: 24px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: transform 0.2s, color 0.2s;
        }
        
        .sidebar-icon:hover { transform: scale(1.1); color: var(--text-light); }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-light);
            position: relative;
        }
        
        .topbar {
            height: 60px;
            background-color: var(--text-light);
            border-bottom: 2px solid var(--primary-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
        }
        
        .topbar h2 { color: var(--primary-blue); font-size: 1.2rem; }
        .topbar .datetime { font-weight: bold; color: var(--secondary-blue); }

        .content-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            position: relative;
        }
        
        .app-screen {
            position: absolute;
            top: 30px;
            left: 30px;
            right: 30px;
            bottom: 30px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .menu-card {
            background-color: var(--text-light);
            border-top: 4px solid var(--accent-gold);
            padding: 40px 20px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        
        .menu-card h3 { color: var(--primary-blue); margin-top: 15px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .stat-box {
            background-color: var(--text-light);
            border: 1px solid var(--border-color);
            border-left: 5px solid var(--primary-blue);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .stat-box h1 {
            font-size: 4rem;
            color: var(--accent-gold);
            margin-bottom: 10px;
        }
        
        .stat-box p { color: var(--text-dark); font-weight: 600; text-transform: uppercase; }

        .visits-container {
            display: flex;
            gap: 20px;
        }
        
        .form-section {
            background-color: var(--text-light);
            padding: 20px;
            border-radius: 8px;
            border-top: 4px solid var(--primary-blue);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            flex: 1;
        }
        
        .form-section label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--secondary-blue);
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 10px 20px;
            background-color: var(--border-color);
            color: var(--text-dark);
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        .tab.active {
            background-color: var(--primary-blue);
            color: var(--text-light);
        }
        
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            background-color: var(--text-light);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--text-light);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        
        th { background-color: var(--primary-blue); color: var(--text-light); }
        tr:hover { background-color: #f1f1f1; }
        
        .status-treated { color: green; font-weight: bold; }
        .status-monitoring { color: orange; font-weight: bold; }
    </style>
</head>
<body>

    <div id="app-view">
        <div class="sidebar">
            <div class="sidebar-icon" onclick="showAppScreen('menu-screen')">☰</div>
            <div class="sidebar-icon" onclick="showAppScreen('stats-screen')">📊</div>
            <div class="sidebar-icon" onclick="showAppScreen('visits-screen')">📝</div>
            <div class="sidebar-icon" onclick="showAppScreen('records-screen')">📁</div>
            <div class="sidebar-icon" onclick="handleLogout()" style="margin-top: auto; margin-bottom: 20px; color: #ff4d4d;">⏏</div>
        </div>

        <div class="main-content">
            <div class="topbar">
                <h2 id="topbar-title">Main Menu</h2>
                <div style="display: flex; gap: 20px; align-items: center;">
                    <span id="user-display" style="font-weight: 600; color: var(--primary-blue);"></span>
                    <span class="datetime" id="datetime-display"></span>
                </div>
            </div>

            <div class="content-area">
                
                <div id="menu-screen" class="app-screen fade-view">
                    <div class="menu-grid">
                        <div class="menu-card" onclick="showAppScreen('stats-screen')">
                            <h1 style="color: var(--accent-gold);">📊</h1>
                            <h3>STATISTICS</h3>
                        </div>
                        <div class="menu-card" onclick="showAppScreen('visits-screen')">
                            <h1 style="color: var(--accent-gold);">📝</h1>
                            <h3>STUDENT VISITS</h3>
                        </div>
                        <div class="menu-card" onclick="showAppScreen('records-screen')">
                            <h1 style="color: var(--accent-gold);">📁</h1>
                            <h3>RECORDS</h3>
                        </div>
                        <div class="menu-card admin-only" id="admin-menu-card" style="display: none;">
                            <h1 style="color: var(--accent-gold);">⚙️</h1>
                            <h3>ADMINISTRATOR</h3>
                        </div>
                        <div class="menu-card" onclick="handleLogout()">
                            <h1 style="color: var(--accent-gold);">⏏</h1>
                            <h3>SIGN OUT</h3>
                        </div>
                    </div>
                </div>

                <div id="stats-screen" class="app-screen fade-hidden">
                    <div class="stats-grid">
                        <div class="stat-box">
                            <h1 id="stat-total">0</h1>
                            <p>Total Visits</p>
                        </div>
                        <div class="stat-box">
                            <h1 id="stat-today">0</h1>
                            <p>Today's Visits</p>
                        </div>
                        <div class="stat-box">
                            <h1 id="stat-treated">0</h1>
                            <p>Treated</p>
                        </div>
                        <div class="stat-box">
                            <h1 id="stat-monitoring">0</h1>
                            <p>Monitoring</p>
                        </div>
                    </div>
                </div>

                <div id="visits-screen" class="app-screen fade-hidden">
                    <div class="visits-container">
                        <div class="form-section">
                            <label>Student Name:</label>
                            <input type="text" id="visit-name" placeholder="Enter full name">
                            <label>Year & Section:</label>
                            <input type="text" id="visit-section" placeholder="e.g. Grade 12 ICT MAWD">
                            <label>Adviser:</label>
                            <input type="text" id="visit-adviser" placeholder="Enter adviser's name">
                        </div>
                        <div class="form-section">
                            <label>Concern:</label>
                            <input type="text" id="visit-concern" placeholder="Primary complaint">
                            <label>Medication Notes:</label>
                            <textarea id="visit-notes" rows="5" placeholder="Enter detailed notes and administered medication"></textarea>
                        </div>
                        <div class="form-section">
                            <label>Nurse Intervention:</label>
                            <input type="text" id="visit-intervention" placeholder="Action taken">
                            <div class="action-buttons">
                                <button class="btn" style="flex: 1; background-color: #28a745;" onclick="saveVisit('Treated')">Mark Treated</button>
                                <button class="btn btn-outline" style="flex: 1;" onclick="saveVisit('Monitoring')">Mark Monitoring</button>
                            </div>
                            <div class="action-buttons" style="margin-top: 40px;">
                                <button class="btn btn-outline" style="flex: 1; width: 100%;" onclick="clearVisitForm()">Clear Form</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="records-screen" class="app-screen fade-hidden">
                    <div class="tabs">
                        <div class="tab active">All Records</div>
                    </div>
                    <div class="filters">
                        <input type="text" id="search-input" placeholder="Search records" style="flex: 2; margin: 0;" onkeyup="renderRecords()">
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Student Name</th>
                                <th>Year & Section</th>
                                <th>Concern</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="records-tbody">
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <script>
        const RECORDS_DB_KEY = 'icc_records'

        window.onload = function() {
            const activeUser = JSON.parse(sessionStorage.getItem('activeUser'))
            if (!activeUser) {
                window.location.href = 'login.html'
                return
            }

            document.getElementById('user-display').innerText = activeUser.role + ': ' + activeUser.name
            
            if (activeUser.role === 'Admin') {
                document.getElementById('admin-menu-card').style.display = 'block'
            }

            let records = JSON.parse(localStorage.getItem(RECORDS_DB_KEY))
            if (!records) {
                localStorage.setItem(RECORDS_DB_KEY, JSON.stringify([]))
            }

            startClock()
            updateStats()
        }

        function showAppScreen(screenId) {
            const screens = ['menu-screen', 'stats-screen', 'visits-screen', 'records-screen']
            screens.forEach(s => {
                document.getElementById(s).className = 'app-screen fade-hidden'
            })
            
            setTimeout(() => {
                document.getElementById(screenId).className = 'app-screen fade-view'
            }, 50)

            const titles = {
                'menu-screen': 'Main Menu',
                'stats-screen': 'Clinic Statistics',
                'visits-screen': 'Student Visit Entry',
                'records-screen': 'Patient Records'
            }
            document.getElementById('topbar-title').innerText = titles[screenId]
            
            if (screenId === 'records-screen') renderRecords()
            if (screenId === 'stats-screen') updateStats()
        }

        function handleLogout() {
            sessionStorage.removeItem('activeUser')
            document.body.style.animation = 'fadeOut 0.4s ease forwards'
            setTimeout(() => {
                window.location.href = 'login.html'
            }, 400)
        }

        function saveVisit(status) {
            const name = document.getElementById('visit-name').value
            const section = document.getElementById('visit-section').value
            const adviser = document.getElementById('visit-adviser').value
            const concern = document.getElementById('visit-concern').value
            const notes = document.getElementById('visit-notes').value
            const intervention = document.getElementById('visit-intervention').value

            if (!name || !concern) {
                alert('Name and Concern are required fields')
                return
            }

            const now = new Date()
            const dateStr = now.toISOString().split('T')[0]

            const record = {
                id: Date.now(),
                date: dateStr,
                name: name,
                section: section,
                adviser: adviser,
                concern: concern,
                notes: notes,
                intervention: intervention,
                status: status
            }

            let records = JSON.parse(localStorage.getItem(RECORDS_DB_KEY))
            records.push(record)
            localStorage.setItem(RECORDS_DB_KEY, JSON.stringify(records))
            
            alert('Visit Saved Successfully')
            clearVisitForm()
            updateStats()
        }

        function clearVisitForm() {
            document.getElementById('visit-name').value = ''
            document.getElementById('visit-section').value = ''
            document.getElementById('visit-adviser').value = ''
            document.getElementById('visit-concern').value = ''
            document.getElementById('visit-notes').value = ''
            document.getElementById('visit-intervention').value = ''
        }

        function renderRecords() {
            const tbody = document.getElementById('records-tbody')
            const search = document.getElementById('search-input').value.toLowerCase()
            let records = JSON.parse(localStorage.getItem(RECORDS_DB_KEY))
            
            tbody.innerHTML = ''
            
            records.reverse().forEach(rec => {
                if (rec.name.toLowerCase().includes(search) || rec.concern.toLowerCase().includes(search)) {
                    const tr = document.createElement('tr')
                    
                    const statusClass = rec.status === 'Treated' ? 'status-treated' : 'status-monitoring'
                    
                    tr.innerHTML = '<td>' + rec.date + '</td>' +
                                   '<td>' + rec.name + '</td>' +
                                   '<td>' + rec.section + '</td>' +
                                   '<td>' + rec.concern + '</td>' +
                                   '<td class="' + statusClass + '">' + rec.status + '</td>'
                    tbody.appendChild(tr)
                }
            })
        }

        function updateStats() {
            let records = JSON.parse(localStorage.getItem(RECORDS_DB_KEY))
            const todayStr = new Date().toISOString().split('T')[0]
            
            let todayCount = 0
            let treatedCount = 0
            let monitoringCount = 0

            records.forEach(rec => {
                if (rec.date === todayStr) todayCount++
                if (rec.status === 'Treated') treatedCount++
                if (rec.status === 'Monitoring') monitoringCount++
            })

            document.getElementById('stat-total').innerText = records.length
            document.getElementById('stat-today').innerText = todayCount
            document.getElementById('stat-treated').innerText = treatedCount
            document.getElementById('stat-monitoring').innerText = monitoringCount
        }

        function startClock() {
            function updateClock() {
                const now = new Date()
                document.getElementById('datetime-display').innerText = now.toLocaleString()
            }
            updateClock()
            setInterval(updateClock, 1000)
        }
    </script>
</body>
</html>
