<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ICC Clinic</title>
    <style>
        :root {
            --primary-blue: #0A3D6B;
            --secondary-blue: #1C65A6;
            --accent-gold: #D4AF37;
            --bg-light: #F4F6F8;
            --text-dark: #333333;
            --text-light: #FFFFFF;
            --border-color: #DDDDDD;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Added fadeOut keyframes for your success transition */
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-10px); }
        }

        .btn {
            background-color: var(--primary-blue);
            color: var(--text-light);
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s, transform 0.1s;
        }
        
        .btn:hover { background-color: var(--secondary-blue); }
        .btn:active { transform: scale(0.98); }
        
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        
        input:focus {
            border-color: var(--secondary-blue);
            box-shadow: 0 0 5px rgba(28, 101, 166, 0.3);
        }

        .split-screen {
            display: flex;
            height: 100vh;
            width: 100%;
            background: var(--bg-light);
        }
        
        .left-panel {
            width: 50%;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }
        
        .left-panel h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: var(--accent-gold);
        }
        
        .left-panel h2 { font-weight: 300; font-size: 1.5rem; }
        
        .right-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--text-light);
            padding: 40px;
        }
        
        .form-container {
            width: 100%;
            max-width: 400px;
        }
        
        .link {
            color: var(--secondary-blue);
            text-decoration: none;
            font-size: 0.9rem;
            display: block;
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
        }
        
        .link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="split-screen">
        <div class="left-panel">
            <h1>Clinic Information System</h1>
            <h2>Immaculada Concepcion College</h2>
        </div>
        <div class="right-panel">
            <div class="form-container" style="text-align: center;">
                
                <img src="logo.png" alt="ICC Logo" style="width: 180px; height: auto; margin-bottom: 30px;">
                
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="reg-fname" placeholder="First Name" style="border-radius: 25px; text-align: center;">
                    <input type="text" id="reg-lname" placeholder="Last Name" style="border-radius: 25px; text-align: center;">
                </div>
                <input type="text" id="reg-user" placeholder="Username" style="border-radius: 25px; text-align: center;">
                <input type="password" id="reg-pass" placeholder="Create Password" style="border-radius: 25px; text-align: center;">
                
                <button class="btn" style="width: 150px; margin-top: 15px; border-radius: 25px; background: linear-gradient(135deg, #1C65A6, #0A3D6B);" onclick="handleRegister()">Create Account</button>
                
                <span class="link" style="margin-top: 25px;" onclick="window.location.href='login.html'">Already have an account? Go to Sign In</span>
            </div>
        </div>
    </div>

    <script>
        const USERS_DB_KEY = 'icc_users'

        function handleRegister() {
            const fname = document.getElementById('reg-fname').value
            const lname = document.getElementById('reg-lname').value
            const user = document.getElementById('reg-user').value
            const pass = document.getElementById('reg-pass').value
            
            if (fname && lname && user && pass) {
                let users = JSON.parse(localStorage.getItem(USERS_DB_KEY)) || []
                users.push({ username: user, password: pass, role: 'Staff', name: fname + ' ' + lname })
                localStorage.setItem(USERS_DB_KEY, JSON.stringify(users))
                alert('Account Created Successfully')
                document.body.style.animation = 'fadeOut 0.4s ease forwards'
                setTimeout(() => {
                    window.location.href = 'login.html'
                }, 400)
            } else {
                alert('Please fill in all fields')
            }
        }
    </script>
</body>
</html>
